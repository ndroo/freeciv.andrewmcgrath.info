app = "freeciv-longturn"
primary_region = "yyz"

[build]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[services]]
  internal_port = 5556
  protocol = "tcp"

  [[services.ports]]
    port = 5556
    handlers = []

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[mounts]
  source = "freeciv_saves"
  destination = "/data/saves"
